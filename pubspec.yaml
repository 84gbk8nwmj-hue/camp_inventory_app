name: camp_inventory_app
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  flutter_riverpod: ^3.3.1
  image_picker: ^1.1.0
  image_cropper: ^8.0.2
  croppy: ^1.5.3
  share_plus: ^13.1.0
  file_picker: ^12.0.0-beta.5
  archive: ^4.0.7
  http: ^1.2.2
  url_launcher: ^6.3.1
  google_fonts: ^8.1.0
  marquee: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/gear_base_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
